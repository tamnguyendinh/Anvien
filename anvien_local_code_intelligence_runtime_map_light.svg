<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anvien local code intelligence and skill system map</title>
  <desc id="desc">A light source-backed architecture map of Anvien: repository state, graph evidence engine, AI skill system, shared command surfaces, and the AI coding loop they support.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2.5L9.5 6L2 9.5" stroke="#6F7A86" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .font{font-family:"SF Pro Display","Helvetica Neue",Arial,sans-serif}
      .mono{font-family:"SF Mono","Geist Mono",Consolas,monospace}
      .title{font-size:34px;font-weight:760;letter-spacing:-0.02em;fill:#1F2933}
      .subtitle{font-size:15px;fill:#5F6B7A}
      .h2{font-size:18px;font-weight:720;fill:#1F2933}
      .h3{font-size:14px;font-weight:700;fill:#243244}
      .body{font-size:13px;fill:#516070}
      .small{font-size:12px;fill:#667382}
      .tiny{font-size:11px;fill:#738091}
      .card{fill:#FFFFFF;stroke:#E6E1DA;stroke-width:1}
      .soft{fill:#FBFBFA;stroke:#E6E1DA;stroke-width:1}
      .blue{fill:#E1F3FE;stroke:#B9DEF3}
      .green{fill:#EDF3EC;stroke:#D2E3D0}
      .yellow{fill:#FBF3DB;stroke:#E8DBAE}
      .red{fill:#FDEBEC;stroke:#F0C9CB}
      .inkBlue{fill:#1F6C9F}
      .inkGreen{fill:#346538}
      .inkYellow{fill:#956400}
      .inkRed{fill:#9F2F2D}
      .chipText{font-size:12px;fill:#334155}
      .edge{stroke:#8B96A3;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .softEdge{stroke:#D8D2C9;stroke-width:1;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#FBFBFA"/>
  <rect x="28" y="28" width="1144" height="664" rx="20" fill="#FFFFFF" stroke="#ECE7DE"/>

  <text x="70" y="78" class="font title">Anvien</text>
  <text x="70" y="106" class="font subtitle">Local code intelligence and skill system for AI coding work</text>
  <text x="764" y="74" class="font small">Source-backed areas read</text>
  <text x="764" y="96" class="mono tiny">internal/analyze + internal/aicontext + internal/cli</text>
  <text x="764" y="113" class="mono tiny">internal/mcp + internal/httpapi + anvien-web + launcher</text>

  <!-- Repo and state -->
  <rect x="70" y="150" width="230" height="380" rx="14" class="soft"/>
  <circle cx="95" cy="176" r="13" class="blue"/>
  <text x="91" y="181" class="font small inkBlue">1</text>
  <text x="112" y="183" class="font h2">Repo state</text>
  <text x="94" y="214" class="font body">Anvien works against local</text>
  <text x="94" y="234" class="font body">repositories and indexes.</text>

  <rect x="94" y="268" width="182" height="34" rx="8" class="card"/>
  <text x="114" y="290" class="mono chipText">target repo files</text>
  <rect x="94" y="314" width="182" height="34" rx="8" class="card"/>
  <text x="114" y="336" class="mono chipText">.anvien storage</text>
  <rect x="94" y="360" width="182" height="34" rx="8" class="card"/>
  <text x="114" y="382" class="mono chipText">global registry</text>
  <rect x="94" y="406" width="182" height="34" rx="8" class="card"/>
  <text x="114" y="428" class="mono chipText">repo groups</text>

  <line x1="94" y1="476" x2="276" y2="476" class="softEdge"/>
  <text x="94" y="501" class="font tiny">Single repo or cross-repo group</text>
  <text x="94" y="518" class="font tiny">remains grounded in local indexes.</text>

  <!-- Core runtime -->
  <rect x="340" y="150" width="500" height="380" rx="14" class="soft"/>
  <circle cx="365" cy="176" r="13" class="green"/>
  <text x="361" y="181" class="font small inkGreen">2</text>
  <text x="382" y="183" class="font h2">Anvien core runtime</text>
  <text x="364" y="214" class="font body">Two engines feed the agent: evidence and working method.</text>

  <rect x="364" y="246" width="452" height="124" rx="10" class="card"/>
  <text x="386" y="272" class="font h3">Graph evidence engine</text>
  <text x="386" y="294" class="font tiny">analyze pipeline: scan / parse / resolve / routes / tools / ORM / flows</text>
  <rect x="386" y="312" width="112" height="30" rx="8" class="yellow"/>
  <text x="406" y="331" class="mono chipText">graph.json</text>
  <rect x="512" y="312" width="104" height="30" rx="8" class="yellow"/>
  <text x="536" y="331" class="mono chipText">lbug DB</text>
  <rect x="630" y="312" width="104" height="30" rx="8" class="yellow"/>
  <text x="649" y="331" class="mono chipText">embeds</text>
  <text x="386" y="356" class="font tiny">context, impact, maps, shape checks, graph health, change detection</text>

  <rect x="364" y="386" width="452" height="124" rx="10" class="card"/>
  <text x="386" y="412" class="font h3">Skill system</text>
  <text x="386" y="434" class="font tiny">discovers SKILL.md packages and renders agent guidance</text>
  <rect x="386" y="452" width="138" height="30" rx="8" class="blue"/>
  <text x="404" y="471" class="mono chipText">.agents/skills</text>
  <rect x="538" y="452" width="138" height="30" rx="8" class="blue"/>
  <text x="556" y="471" class="mono chipText">.claude/skills</text>
  <rect x="690" y="452" width="104" height="30" rx="8" class="blue"/>
  <text x="711" y="471" class="mono chipText">AGENTS</text>
  <text x="386" y="496" class="font tiny">planner, coder, QA, domain skills, setup hooks, skill manifests</text>

  <!-- Surfaces -->
  <rect x="890" y="150" width="240" height="380" rx="14" class="soft"/>
  <circle cx="915" cy="176" r="13" class="red"/>
  <text x="911" y="181" class="font small inkRed">3</text>
  <text x="932" y="183" class="font h2">Command surfaces</text>
  <text x="914" y="214" class="font body">One Anvien capability set,</text>
  <text x="914" y="234" class="font body">exposed in several ways.</text>

  <rect x="914" y="268" width="192" height="36" rx="8" class="card"/>
  <text x="934" y="291" class="mono chipText">CLI commands</text>
  <rect x="914" y="316" width="192" height="36" rx="8" class="card"/>
  <text x="934" y="339" class="mono chipText">MCP tools/resources</text>
  <rect x="914" y="364" width="192" height="36" rx="8" class="card"/>
  <text x="934" y="387" class="mono chipText">local HTTP API</text>
  <rect x="914" y="412" width="192" height="36" rx="8" class="card"/>
  <text x="934" y="435" class="mono chipText">Web UI + sessions</text>
  <rect x="914" y="460" width="192" height="36" rx="8" class="card"/>
  <text x="934" y="483" class="mono chipText">setup + launcher</text>

  <!-- Flow arrows -->
  <path d="M300 310H340" class="edge"/>
  <path d="M300 452H340" class="edge"/>
  <path d="M840 310H890" class="edge"/>
  <path d="M840 452H890" class="edge"/>

  <!-- AI coding loop -->
  <rect x="70" y="566" width="1060" height="92" rx="14" fill="#F7F6F3" stroke="#E6E1DA"/>
  <circle cx="95" cy="592" r="13" class="yellow"/>
  <text x="91" y="597" class="font small inkYellow">4</text>
  <text x="112" y="599" class="font h2">AI coding loop supported by Anvien</text>
  <text x="94" y="629" class="font small">choose skill</text>
  <path d="M170 625H220" class="edge"/>
  <text x="236" y="629" class="font small">find evidence</text>
  <path d="M322 625H372" class="edge"/>
  <text x="388" y="629" class="font small">plan impact</text>
  <path d="M466 625H516" class="edge"/>
  <text x="532" y="629" class="font small">change code</text>
  <path d="M616 625H666" class="edge"/>
  <text x="682" y="629" class="font small">validate</text>
  <path d="M738 625H788" class="edge"/>
  <text x="804" y="629" class="font small">detect changes</text>
  <path d="M912 625H962" class="edge"/>
  <text x="978" y="629" class="font small">commit / handoff</text>
  <text x="94" y="648" class="font tiny">The graph tells the agent what is true in the repo. Skills tell the agent how to work for the task. Both are part of Anvien.</text>
</svg>
