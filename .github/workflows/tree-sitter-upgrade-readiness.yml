name: Tree-sitter Go Module Drift

# Monitors Tree-sitter parser dependency drift for the current Go module
# parser stack. The checker reports actionable Go module updates and keeps
# upstream Tree-sitter core releases separate from Go binding availability.
# See .github/scripts/check-tree-sitter-upgrade-readiness.py for the logic.
#
# Concurrency convention: see CONTRIBUTING.md → "GitHub Actions — Concurrency Convention".

on:
  schedule:
    # Daily at 09:00 UTC. Matches Dependabot's daily cadence so drift
    # and dep PRs surface together.
    - cron: '0 9 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/scripts/check-tree-sitter-upgrade-readiness.py'
      - '.github/scripts/test_check_tree_sitter_upgrade_readiness.py'
      - '.github/workflows/tree-sitter-upgrade-readiness.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  readiness:
    name: Check module drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Needed to open/update the tracking issue on scheduled runs.
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-anvien
        with:
          build: 'false'

      - name: Run upgrade readiness check
        id: readiness
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python3 .github/scripts/check-tree-sitter-upgrade-readiness.py > drift-report.md
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<DRIFT_EOF'
            cat drift-report.md
            echo 'DRIFT_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "=== Report ==="
          cat drift-report.md

      # On PR runs, the script validates that it runs correctly. Actionable
      # drift is reported as a warning; scheduled runs open a tracking issue.
      - name: Annotate PR with drift status
        if: github.event_name == 'pull_request' && steps.readiness.outputs.exit_code != '0'
        run: |
          echo "::warning::Tree-sitter Go module drift detected. See job output for the full drift report."

      - name: Upsert tracking issue on scheduled runs
        if: >
          github.event_name == 'schedule' &&
          steps.readiness.outputs.exit_code != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT: ${{ steps.readiness.outputs.report }}
        with:
          script: |
            const title = 'Tree-sitter Go module drift';
            const report = process.env.REPORT;
            const body = report + '\n\n' +
              '<sub>Generated daily by `.github/workflows/tree-sitter-upgrade-readiness.yml`. ' +
              'Closes automatically when actionable drift is resolved.</sub>';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tree-sitter-drift',
              per_page: 10,
            });
            const existing = open.find(i => i.title === title);
            if (existing) {
              // Extract module/drift counts for the changelog comment.
              const moduleMatch = report.match(/Tree-sitter modules found: \*\*(\d+)\*\*/);
              const driftMatch = report.match(/Actionable drift rows: \*\*(\d+)\*\*/);
              const modules = moduleMatch ? moduleMatch[1] : '?';
              const drift = driftMatch ? driftMatch[1] : '?';

              // Find grammars whose status changed by diffing the old and
              // new table rows.  Each row looks like:
              //   | `github.com/tree-sitter/tree-sitter-go` | ... | UP_TO_DATE | ...
              //   | `github.com/tree-sitter/tree-sitter-go` | ... | GRAMMAR_UPDATE_AVAILABLE | ...
              const parseRows = (md) => {
                const map = {};
                for (const m of md.matchAll(/^\| `([^`]+)` \|.*?\| ([A-Z_]+) \|.*?$/gm)) {
                  map[m[1]] = m[2].trim();
                }
                return map;
              };
              const oldRows = parseRows(existing.body || '');
              const newRows = parseRows(report);
              const changes = [];
              for (const [name, newStatus] of Object.entries(newRows)) {
                const oldStatus = oldRows[name];
                if (oldStatus && oldStatus !== newStatus) {
                  changes.push(`\`${name}\`: ${oldStatus} → ${newStatus}`);
                }
              }

              const today = new Date().toISOString().slice(0, 10);
              let comment = `**${today}:** ${modules} Tree-sitter module(s). ${drift} actionable drift row(s).`;
              if (changes.length > 0) {
                comment += '\n\nChanges:\n' + changes.map(c => `- ${c}`).join('\n');
              } else {
                comment += ' No changes from previous run.';
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: comment,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['tree-sitter-drift', 'dependencies'],
              });
              core.info(`Opened issue #${created.number}`);
            }

      - name: Close tracking issue on clean scheduled runs
        if: >
          github.event_name == 'schedule' &&
          steps.readiness.outputs.exit_code == '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'Tree-sitter Go module drift';
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tree-sitter-drift',
              per_page: 10,
            });
            const existing = open.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: 'No actionable Tree-sitter Go module drift remains. Closing automatically.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.info(`Closed issue #${existing.number}`);
            }
