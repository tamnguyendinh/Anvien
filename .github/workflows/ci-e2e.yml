name: E2E Tests

on:
  workflow_call:

jobs:
  check-changes:
    name: Check runtime or web module changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      e2e_changed: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v3
        id: filter
        with:
          filters: |
            e2e:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile.cli'
              - 'docker-compose.yaml'
              - 'scripts/**'
              - 'anvien-launcher/**'
              - 'anvien-web/**'

  e2e:
    name: e2e (chromium)
    needs: check-changes
    if: needs.check-changes.result == 'success' && needs.check-changes.outputs.e2e_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: anvien-web/package-lock.json

      - name: Install Web UI dependencies
        run: npm ci
        working-directory: anvien-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: anvien-web

      - name: Prepare LadybugDB native runtime
        run: |
          LADYBUG_NATIVE_DIR="$(bash scripts/ensure-ladybug-native.sh auto .tmp/ladybug-native)"
          echo "LADYBUG_NATIVE_DIR=$LADYBUG_NATIVE_DIR" >> "$GITHUB_ENV"

      - name: Build Go backend
        run: |
          mkdir -p .tmp
          CGO_CFLAGS="-I$LADYBUG_NATIVE_DIR" \
            CGO_LDFLAGS="-L$LADYBUG_NATIVE_DIR -llbug" \
            go build -tags ladybugdb -trimpath -o .tmp/anvien ./cmd/anvien

      - name: Analyze repository (index for backend)
        run: |
          export LD_LIBRARY_PATH="$LADYBUG_NATIVE_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          ./.tmp/anvien analyze --force || true
          if [ ! -d ".anvien" ]; then
            echo "::error::No .anvien index created"
            exit 1
          fi

      - name: Start backend server
        run: |
          export LD_LIBRARY_PATH="$LADYBUG_NATIVE_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          ./.tmp/anvien serve --host 127.0.0.1 --port 4747 &

      - name: Wait for backend readiness
        run: npx wait-on http://127.0.0.1:4747/api/info --timeout 30000
        working-directory: anvien-web

      - name: Start Vite dev server
        run: npm run dev &
        working-directory: anvien-web

      - name: Wait for Vite dev server
        run: npx wait-on http://127.0.0.1:5228 --timeout 30000
        working-directory: anvien-web

      - name: Run E2E tests
        run: npx playwright test --workers=1
        working-directory: anvien-web
        env:
          E2E: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results
          path: |
            anvien-web/test-results/
            anvien-web/playwright-report/
          retention-days: 5
